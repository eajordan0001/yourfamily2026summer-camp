<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>優兒夏令營行動銀行 Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { 
            --brand-pink: #e6007e; 
            --brand-pink-dark: #c0006a;
            --primary: #007bff; 
            --success: #28a745; 
            --danger: #dc3545; 
            --gray: #6c757d;   
            --light-gray: #f8f9fa;
            
            /* 背景卡片調整：稍微增加透明度，讓背景照片隱約透出 */
            --card-white: rgba(255, 255, 255, 0.94);
        }

        body { 
            font-family: -apple-system, sans-serif; 
            text-align: center; 
            padding: 10px; 
            margin: 0; 
            color: #333;
            /* 設定背景照片 */
            background-image: url('https://i.postimg.cc/N0mCKrBX/IMG-9279.jpg');
            background-size: cover;      /* 確保照片填滿螢幕 */
            background-position: center; /* 確保照片置中 */
            background-attachment: fixed; /* 捲動時背景固定，不卡頓 */
            background-repeat: no-repeat;
            min-height: 100vh;
        }

        /* 加一層半透明遮罩，確保文字在任何背景圖下都清晰 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.15); /* 輕微壓暗背景 */
            z-index: -1;
        }

        h2 { 
            margin: 20px 0; 
            color: white; 
            font-size: 24px; 
            text-shadow: 2px 2px 8px rgba(0,0,0,0.5); /* 加強標題陰影 */
        }

        /* 掃描容器 */
        #reader-container { width: 90%; max-width: 400px; margin: 10px auto; }
        #reader { 
            width: 100%; 
            border-radius: 25px; 
            overflow: hidden; 
            background: #000; 
            border: 6px solid white !important; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
        }
        #reader__dashboard_section_csr, #reader__camera_selection, #reader img { display: none !important; }

        /* 交易介面卡片 */
        #result-section { 
            display: none; 
            padding: 20px; 
            background-color: var(--card-white);
            border-radius: 30px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
            margin: 10px; 
            animation: fadeIn 0.2s ease; 
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .info-box { background: #fdf2f7; padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #f9d6e5; }
        .name { font-size: 30px; font-weight: bold; color: var(--brand-pink); margin-bottom: 5px; }
        .balance { font-size: 42px; font-weight: 900; color: #000; }
        .id-badge { font-size: 13px; color: #999; margin-bottom: 5px; }

        /* 手動輸入框 (黑框區) */
        .input-wrapper { margin: 15px 0; }
        input[type="number"] { 
            padding: 15px; 
            font-size: 38px; 
            width: 85%; 
            border-radius: 18px; 
            border: 3px solid #333; 
            text-align: center; 
            font-weight: bold; 
            outline: none;
            background: white;
        }
        
        .section-title { text-align: left; font-size: 15px; color: #555; margin: 15px 0 8px 10px; font-weight: bold; }

        /* 快捷金額 (紅框區：2列4欄) */
        .btn-grid-8 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-small { padding: 15px 2px; font-size: 18px; background: #fff; border: 1px solid #ddd; border-radius: 15px; font-weight: bold; }
        .btn-plus { color: var(--success); border-bottom: 3px solid #e1e1e1; }
        .btn-minus { color: var(--danger); border-bottom: 3px solid #e1e1e1; }

        .btn-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-category { background: var(--light-gray); color: #444; border-radius: 12px; border: 1px solid #ddd; }
        .btn-category.active { background: var(--brand-pink) !important; color: white !important; border: 1px solid var(--brand-pink-dark); }
        
        button.main { padding: 20px; font-size: 24px; font-weight: bold; border-radius: 22px; border: none; width: 100%; margin-top: 5px; cursor: pointer; }
        .btn-confirm { background: var(--success); color: white; box-shadow: 0 6px 20px rgba(40,167,69,0.3); }
        .btn-cancel { background: var(--gray); color: white; margin-top: 20px; font-size: 16px; border-radius: 15px; }

        /* 啟動按鈕 */
        #start-btn { 
            padding: 22px 60px; 
            font-size: 26px; 
            font-weight: bold; 
            background-color: var(--brand-pink); 
            color: white; 
            border: none; 
            border-radius: 60px; 
            cursor: pointer; 
            margin: 80px auto; 
            display: block; 
            box-shadow: 0 10px 30px rgba(230,0,126,0.5); 
        }
    </style>
</head>
<body>

    <h2 id="main-title">💰 優兒夏令營行動銀行</h2>
    
    <div id="reader-container">
        <div id="reader"></div>
        <button id="start-btn" onclick="requestPermission()">啟動鏡頭</button>
    </div>
    
    <div id="result-section">
        <div class="info-box">
            <div id="display-name" class="name">載入中...</div>
            <div class="id-badge">ID: <span id="display-id">---</span></div>
            <div style="font-size: 14px; color: #666;">目前餘額</div>
            <div id="display-balance" class="balance">---</div>
        </div>
        
        <div class="input-wrapper">
            <input type="number" id="amount" value="0" pattern="[0-9-]*">
        </div>
        
        <div class="section-title">快速金額加總</div>
        <div class="btn-grid-8">
            <button class="btn-small btn-plus" onclick="addVal(1)">+1</button>
            <button class="btn-small btn-plus" onclick="addVal(5)">+5</button>
            <button class="btn-small btn-plus" onclick="addVal(10)">+10</button>
            <button class="btn-small btn-plus" onclick="addVal(50)">+50</button>
            <button class="btn-small btn-minus" onclick="addVal(-1)">-1</button>
            <button class="btn-small btn-minus" onclick="addVal(-5)">-5</button>
            <button class="btn-small btn-minus" onclick="addVal(-10)">-10</button>
            <button class="btn-small btn-minus" onclick="addVal(-50)">-50</button>
        </div>

        <div class="section-title">交易項目</div>
        <div class="btn-grid-3">
            <button class="btn-small btn-category" onclick="setNote(this, '餅乾')">🍪 餅乾</button>
            <button class="btn-small btn-category" onclick="setNote(this, '飲料')">🧃 飲料</button>
            <button class="btn-small btn-category" onclick="setNote(this, '其他')">❓ 其他</button>
        </div>
        <input type="hidden" id="note" value="一般交易">
        
        <button id="send-btn" class="main btn-confirm" onclick="sendData()">確認交易</button>
        <button class="main btn-cancel" onclick="resumeScanner()">取消並重掃</button>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbx61w5SchKA2-CUpBs3QBCOS79u5CoPy7yZMTzbiLJo-MySiAn_O-96DGuC68bJs1Pz/exec"; 
        let html5QrCode;
        let globalId = ""; 
        let isPaused = false;

        function requestPermission() {
            const startBtn = document.getElementById('start-btn');
            if(startBtn) startBtn.style.display = 'none';
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 20, qrbox: { width: 220, height: 220 }, aspectRatio: 1.0 };
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(() => { if(startBtn) startBtn.style.display = 'block'; });
        }

        function onScanSuccess(decodedText) {
            if (isPaused) return;
            isPaused = true;
            if (navigator.vibrate) navigator.vibrate(80);
            globalId = decodedText.trim();

            document.getElementById('reader-container').style.display = 'none';
            document.getElementById('main-title').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            
            document.getElementById('display-id').innerText = globalId;
            document.getElementById('display-name').innerText = "讀取中...";
            document.getElementById('amount').value = 0;

            fetch(`${scriptURL}?id=${encodeURIComponent(globalId)}&amount=0`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('display-name').innerText = data.name || "未命名";
                document.getElementById('display-balance').innerText = data.balance ?? "0";
            });
        }

        function resumeScanner() {
            isPaused = false;
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('reader-container').style.display = 'block';
            document.getElementById('main-title').style.display = 'block';
        }

        function addVal(v) {
            const input = document.getElementById('amount');
            let current = parseInt(input.value) || 0;
            input.value = current + v;
        }

        function setNote(btn, n) {
            document.querySelectorAll('.btn-category').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('note').value = n;
        }

        function sendData() {
            const amountVal = document.getElementById('amount').value;
            const noteVal = document.getElementById('note').value;
            if(amountVal == 0 || amountVal == "") return alert("請輸入金額");

            const btn = document.getElementById('send-btn');
            btn.innerText = "寫入中..."; btn.disabled = true;

            fetch(`${scriptURL}?id=${encodeURIComponent(globalId)}&amount=${amountVal}&note=${encodeURIComponent(noteVal)}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    alert(`✅ 完成！\n學員：${data.name}\n變動：${amountVal}\n餘額：${data.newBalance}`);
                    btn.innerText = "確認交易"; btn.disabled = false;
                    resumeScanner();
                } else {
                    alert("失敗：" + data.message);
                    btn.innerText = "確認交易"; btn.disabled = false;
                }
            })
            .catch(() => {
                alert("網路異常");
                btn.innerText = "確認交易"; btn.disabled = false;
            });
        }
    </script>
</body>
</html>
