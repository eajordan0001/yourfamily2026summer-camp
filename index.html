<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>優兒行動銀行系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; margin-bottom: 20px; border: 1px solid #ddd; background: #000; }
        #result-section { display: none; }
        .info-display { font-size: 18px; margin: 15px 0; padding: 15px; background: #f8f9fa; border: 2px solid #eee; border-radius: 10px; }
        .name-txt { font-size: 24px; font-weight: bold; color: #e6007e; }
        .balance-txt { font-size: 32px; font-weight: bold; }
        input[type="number"] { width: 80%; padding: 10px; font-size: 28px; margin: 10px 0; text-align: center; border: 2px solid #ccc; border-radius: 8px; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 10px 0; }
        .btn-small { padding: 10px 0; font-size: 16px; cursor: pointer; border-radius: 5px; border: 1px solid #ddd; background: white; font-weight: bold; }
        .item-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 15px 0; }
        .btn-item { padding: 10px 2px; font-size: 13px; cursor: pointer; background: #eee; border: 1px solid #ccc; border-radius: 5px; font-weight: bold; }
        .btn-item.active { background: #e6007e; color: white; border-color: #e6007e; }
        .btn-main { width: 100%; padding: 15px; font-size: 20px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #6c757d; margin-top: 15px; width: 100%; padding: 12px; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .err-hint { color: red; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color:#e6007e;">💰 優兒行動銀行</h2>
        <div id="reader-container">
            <div id="reader"></div>
            <p id="scan-hint">請掃描學員 QR Code</p>
        </div>

        <div id="result-section">
            <div class="info-display">
                學員：<span id="display-name" class="name-txt">讀取中...</span><br>
                目前餘額：<span id="display-balance" class="balance-txt">---</span>
                <div id="err-text" class="err-hint"></div>
            </div>
            
            <input type="number" id="amount" value="0" inputmode="numeric">
            
            <div class="btn-grid">
                <button class="btn-small" onclick="adj(1)">+1</button>
                <button class="btn-small" onclick="adj(5)">+5</button>
                <button class="btn-small" onclick="adj(10)">+10</button>
                <button class="btn-small" onclick="adj(50)">+50</button>
                <button class="btn-small" onclick="adj(-1)">-1</button>
                <button class="btn-small" onclick="adj(-5)">-5</button>
                <button class="btn-small" onclick="adj(-10)">-10</button>
                <button class="btn-small" onclick="adj(-50)">-50</button>
            </div>

            <div style="text-align: left; font-size: 14px; font-weight: bold;">交易項目：</div>
            <div id="item-container" class="item-grid">
                <button class="btn-item active" onclick="setN(this, '餅乾')">餅乾</button>
                <button class="btn-item" onclick="setN(this, '飲料')">飲料</button>
                <button class="btn-item" onclick="setN(this, '其他')">其他</button>
                <button class="btn-item" onclick="setN(this, '預留1')">預留1</button>
                <button class="btn-item" onclick="setN(this, '預留2')">預留2</button>
                <button class="btn-item" onclick="setN(this, '預留3')">預留3</button>
                <button class="btn-item" onclick="setN(this, '預留4')">預留4</button>
                <button class="btn-item" onclick="setN(this, '預留5')">預留5</button>
                <button class="btn-item" onclick="setN(this, '預留6')">預留6</button>
                <button class="btn-item" onclick="setN(this, '預留7')">預留7</button>
                <button class="btn-item" onclick="setN(this, '預留8')">預留8</button>
                <button class="btn-item" onclick="setN(this, '預留9')">預留9</button>
            </div>
            <input type="hidden" id="note" value="餅乾">
            
            <button id="ok-btn" class="btn-main" onclick="doTrade()">確認加值/扣款</button>
            <button class="btn-cancel" onclick="resetUI()">取消 / 重新掃描</button>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbzI8YIKfK2h5MVeUOWE1oJq4mHu4KguUOVS_gt0wZdHvSz1AaDaOaE8jCD0rmz9q9SV/exec";
        let scanner, globalId = "", isBusy = false, tid = "";

        function startScan() {
            isBusy = false;
            globalId = ""; 
            document.getElementById('reader-container').style.display = 'block';
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('err-text').innerText = "";

            if (!scanner) scanner = new Html5Qrcode("reader");
            
            scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
                if (isBusy) return;
                isBusy = true;
                globalId = text.trim();
                tid = "T" + Date.now();
                
                // 🚀 關鍵優化：進入畫面時清空上次數據
                clearInputData(); 
                
                document.getElementById('reader-container').style.display = 'none';
                document.getElementById('result-section').style.display = 'block';
                
                scanner.stop().then(() => fetchData());
            }).catch(e => console.error(e));
        }

        // 🚀 執行數據清理函數
        function clearInputData() {
            // 1. 金額歸零
            document.getElementById('amount').value = "0";
            
            // 2. 姓名與餘額重置為讀取中狀態
            document.getElementById('display-name').innerText = "讀取中...";
            document.getElementById('display-balance').innerText = "---";
            
            // 3. 重置項目按鈕樣式
            const buttons = document.querySelectorAll('.btn-item');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // 4. 恢復預設項目為「餅乾」
            if (buttons.length > 0) {
                buttons[0].classList.add('active'); // 預設選中第一個按鈕 (餅乾)
                document.getElementById('note').value = buttons[0].innerText;
            }
        }

        async function fetchData() {
            try {
                const finalURL = `${scriptURL}?id=${encodeURIComponent(globalId)}&amount=0&timestamp=${Date.now()}`;
                const res = await fetch(finalURL);
                const data = await res.json();
                if (data.status === "success") {
                    document.getElementById('display-name').innerText = data.name;
                    document.getElementById('display-balance').innerText = data.balance;
                } else { throw new Error(data.message); }
            } catch (e) {
                document.getElementById('display-name').innerText = "失敗";
                document.getElementById('err-text').innerText = "連線異常：" + e.message;
            }
        }

        async function doTrade() {
            const amt = document.getElementById('amount').value;
            if (amt == 0) return alert("請輸入金額");
            const btn = document.getElementById('ok-btn');
            const note = document.getElementById('note').value;
            btn.innerText = "寫入中..."; btn.disabled = true;

            try {
                const res = await fetch(`${scriptURL}?id=${encodeURIComponent(globalId)}&amount=${amt}&tid=${tid}&note=${encodeURIComponent(note)}&t=${Date.now()}`);
                const data = await res.json();
                if (data.status === "success") {
                    alert(`✅ 交易完成！\n學員：${data.name}\n新餘額：${data.newBalance}`);
                    resetUI();
                } else { alert("錯誤：" + data.message); resetBtn(); }
            } catch (e) {
                alert("🔴 網路不穩，請確認試算表紀錄。");
                resetBtn();
            }
        }

        function resetUI() {
            resetBtn();
            startScan();
        }

        function adj(v) { document.getElementById('amount').value = (parseInt(document.getElementById('amount').value) || 0) + v; }
        
        function setN(btn, n) {
            document.querySelectorAll('.btn-item').forEach(e => e.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('note').value = n;
        }

        function resetBtn() {
            const btn = document.getElementById('ok-btn');
            btn.innerText = "確認扣款"; btn.disabled = false;
        }

        window.onload = startScan;
    </script>
</body>
</html>
