<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbx61w5SchKA2-CUpBs3QBCOS79u5CoPy7yZMTzbiLJo-MySiAn_O-96DGuC68bJs1Pz/exec"; 
    let html5QrCode, globalId = "", isPaused = false, currentTid = "";

    // 啟動鏡頭與掃描成功邏輯保持不變...
    function onScanSuccess(decodedText) {
        if (isPaused) return;
        isPaused = true;
        if (navigator.vibrate) navigator.vibrate(80);
        globalId = decodedText.trim();
        // 🚀 生成唯一 TID (交易序號)
        currentTid = "TID" + Date.now() + Math.floor(Math.random()*1000);

        document.getElementById('reader-container').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('display-id').innerText = globalId;
        document.getElementById('display-name').innerText = "讀取中...";
        if(html5QrCode) html5QrCode.pause();

        fetch(`${scriptURL}?id=${encodeURIComponent(globalId)}&amount=0`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('display-name').innerText = data.name || "未命名";
            document.getElementById('display-balance').innerText = data.balance ?? "0";
        }).catch(() => { document.getElementById('display-name').innerText = "連線稍慢..."; });
    }

    // 🚀 核心優化：更強大的發送與超時控制
    async function sendData() {
        const amountVal = document.getElementById('amount').value;
        if(amountVal == 0 || amountVal == "") return alert("請輸入金額");
        
        const btn = document.getElementById('send-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        
        // 鎖定 UI 防止重複連點
        btn.innerText = "連線中...請稍候";
        btn.disabled = true;
        cancelBtn.style.opacity = "0.3";
        cancelBtn.onclick = null;

        const fullURL = `${scriptURL}?id=${encodeURIComponent(globalId)}&amount=${amountVal}&note=${encodeURIComponent(document.getElementById('note').value)}&tid=${currentTid}`;

        try {
            // 延長超時至 45 秒，Google 寫入有時確實較慢
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 45000);

            const response = await fetch(fullURL, { method: 'GET', mode: 'cors', signal: controller.signal });
            clearTimeout(timeoutId);

            const data = await response.json();
            if(data.status === "success") {
                alert(`✅ 交易完成！\n學員：${data.name}\n餘額：${data.newBalance}`);
                resumeScanner();
            } else {
                alert("⚠️ 錯誤：" + data.message);
                resetButtons();
            }
        } catch (error) {
            console.error(error);
            // 🚀 這裡就是您截圖出現的地方。
            // 我們不再只是跳警告，而是告訴老師最安全的做法：
            alert("🔴 訊號中斷或伺服器無回應！\n\n【安全保險步驟】：\n1. 請先手動查看試算表最後一行。\n2. 若已有扣款，請點擊『取消重掃』處理下一位。\n3. 若沒扣款，請再次點擊『確認交易』。");
            resetButtons();
        }
    }

    function resetButtons() {
        const btn = document.getElementById('send-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        btn.innerText = "確認交易";
        btn.disabled = false;
        cancelBtn.style.opacity = "1";
        cancelBtn.onclick = resumeScanner;
    }

    // resumeScanner 與其他小工具保持不變...
</script>
