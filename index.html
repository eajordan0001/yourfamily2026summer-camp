<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>夏令營行動銀行 Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --gray: #6c757d; --light-gray: #e9ecef; }
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 15px; background: #f0f2f5; color: #333; margin: 0; }
        h2 { margin: 15px 0; color: #1a1a1a; font-size: 24px; }
        
        #reader-container { width: 100%; max-width: 450px; margin: 0 auto; }
        #reader { width: 100%; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.15); background: #000; min-height: 250px; border: none !important; }
        
        /* 隱藏套件雜訊 */
        #reader__dashboard_section_csr, #reader__camera_selection, #reader img, #reader span { display: none !important; }

        #result-section { margin-top: 15px; padding: 20px; background: white; border-radius: 20px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .info-box { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; }
        .name { font-size: 26px; font-weight: bold; color: var(--primary); }
        .balance { font-size: 32px; font-weight: 900; }

        input[type="number"] { padding: 15px; font-size: 28px; width: 85%; margin: 10px 0; border-radius: 12px; border: 2px solid #ddd; text-align: center; font-weight: bold; background: #fff; color: #000; outline: none; }
        
        .section-title { text-align: left; font-size: 14px; color: #666; margin: 15px 0 5px 5px; font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-small { padding: 12px; font-size: 18px; background: #fff; border: 1px solid #ddd; border-radius: 8px; font-weight: bold; }
        
        /* 分類按鈕樣式 */
        .btn-category { background: var(--light-gray); color: #495057; border: 2px solid transparent; font-size: 16px; transition: all 0.2s; }
        .btn-category.active { background: var(--primary); color: white; border-color: #0056b3; transform: scale(0.95); }
        
        button.main { padding: 18px; font-size: 20px; font-weight: bold; border-radius: 15px; border: none; width: 100%; margin-top: 10px; }
        .btn-confirm { background: var(--success); color: white; }
        .btn-cancel { background: var(--gray); color: white; }

        #start-btn { padding: 20px 40px; font-size: 22px; font-weight: bold; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; margin: 50px auto; display: block; }
    </style>
</head>
<body>

    <h2>💰 夏令營行動銀行</h2>
    
    <div id="reader-container">
        <div id="reader"></div>
        <button id="start-btn" onclick="requestPermission()">開啟相機掃描</button>
    </div>
    
    <div id="result-section">
        <div class="info-box">
            <span class="name" id="display-name">讀取中...</span><br>
            <span style="font-size: 14px; color: #666;">目前餘額：</span>
            <span id="display-balance" class="balance">---</span>
        </div>
        
        <input type="number" id="amount" value="0" readonly>
        
        <div class="section-title">快速金額加總 (5 / 10 / 50)</div>
        <div class="btn-grid">
            <button class="btn-small" onclick="addVal(5)" style="color:var(--success)">+5</button>
            <button class="btn-small" onclick="addVal(10)" style="color:var(--success)">+10</button>
            <button class="btn-small" onclick="addVal(50)" style="color:var(--success)">+50</button>
            <button class="btn-small" onclick="addVal(-5)" style="color:var(--danger)">-5</button>
            <button class="btn-small" onclick="addVal(-10)" style="color:var(--danger)">-10</button>
            <button class="btn-small" onclick="addVal(-50)" style="color:var(--danger)">-50</button>
        </div>

        <div class="section-title">交易分類 (選中變藍色)</div>
        <div class="btn-grid">
            <button class="btn-small btn-category" onclick="setNote(this, '餅乾')">🍪 餅乾</button>
            <button class="btn-small btn-category" onclick="setNote(this, '飲料')">🧃 飲料</button>
            <button class="btn-small btn-category" onclick="setNote(this, '其他')">❓ 其他</button>
            <button class="btn-small btn-category" onclick="setNote(this, '預留1')">預留</button>
            <button class="btn-small btn-category" onclick="setNote(this, '預留2')">預留</button>
            <button class="btn-small btn-category" onclick="setNote(this, '預留3')">預留</button>
        </div>
        <input type="hidden" id="note" value="一般交易">
        
        <button id="send-btn" class="main btn-confirm" onclick="sendData()">確認交易</button>
        <button class="main btn-cancel" onclick="location.reload()">重新掃描</button>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbx61w5SchKA2-CUpBs3QBCOS79u5CoPy7yZMTzbiLJo-MySiAn_O-96DGuC68bJs1Pz/exec"; 
        
        let html5QrCode;
        let globalId = ""; 

        function requestPermission() {
            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = true;
            startBtn.innerText = "相機快馬加鞭中...";

            html5QrCode = new Html5Qrcode("reader");
            
            // 🚀 優化掃描速度：fps 提高，減少 qrbox 大小提高解析效率
            const config = { 
                fps: 25, 
                qrbox: { width: 220, height: 220 },
                aspectRatio: 1.0,
                // 限制影像解析度避免運算負擔過重
                videoConstraints: {
                    facingMode: "environment",
                    width: { ideal: 640 },
                    height: { ideal: 480 }
                }
            };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess
            ).then(() => {
                startBtn.style.display = 'none';
            }).catch(err => {
                alert("相機開啟失敗，請確認已授權。");
                startBtn.disabled = false;
                startBtn.innerText = "開啟相機掃描";
            });
        }

        function onScanSuccess(decodedText) {
            globalId = decodedText.trim();
            if (navigator.vibrate) navigator.vibrate(100);
            
            // 🚀 瞬間切換 UI，不再等待 stop()
            document.getElementById('reader-container').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';

            html5QrCode.stop().catch(() => {});

            // 同步獲取資料
            fetch(`${scriptURL}?id=${encodeURIComponent(globalId)}&amount=0`)
            .then(res => res.json())
            .then(data => {
                if(data.name) {
                    document.getElementById('display-name').innerText = data.name;
                    document.getElementById('display-balance').innerText = data.balance;
                } else {
                    alert("查無此學員！");
                    location.reload();
                }
            })
            .catch(() => alert("資料讀取失敗！"));
        }

        function addVal(v) {
            let input = document.getElementById('amount');
            input.value = parseInt(input.value || 0) + v;
        }

        // 🎨 更新分類按鈕點選邏輯
        function setNote(btn, n) {
            // 清除所有分類按鈕的 active 樣式
            document.querySelectorAll('.btn-category').forEach(el => {
                el.classList.remove('active');
            });
            // 幫點選的按鈕加上 active 樣式
            btn.classList.add('active');
            document.getElementById('note').value = n;
        }

        function sendData() {
            const amountVal = document.getElementById('amount').value;
            const noteVal = document.getElementById('note').value;
            
            if(amountVal == 0) return alert("金額不能為 0");
            if(!globalId) return alert("遺失學員 ID，請重新掃描");

            const btn = document.getElementById('send-btn');
            btn.innerText = "交易傳送中..."; 
            btn.disabled = true;

            fetch(`${scriptURL}?id=${encodeURIComponent(globalId)}&amount=${amountVal}&note=${encodeURIComponent(noteVal)}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    alert(`✅ 成功！\n${data.name}\n新餘額：${data.newBalance}`);
                    location.reload();
                } else {
                    alert("交易失敗：" + data.message);
                    btn.disabled = false;
                    btn.innerText = "確認交易";
                }
            })
            .catch(() => location.reload());
        }
    </script>
</body>
</html>
