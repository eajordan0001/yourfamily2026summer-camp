<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>優兒行動銀行 v6.0 (五大區品項特製版)</title>
    
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
    <link rel="apple-touch-icon" href="./icon-512.png">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="優兒行動銀行">

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { 
            --primary-pink: #e6007e; --bg-pink: #fce4ec; --dark-gray: #333; --btn-light: #eee; --disabled-gray: #999;
        }
        body { font-family: -apple-system, "Noto Sans TC", sans-serif; text-align: center; margin: 0;
        padding: 15px; background-color: var(--primary-pink); }
        .main-card { background: var(--bg-pink); padding: 20px; border-radius: 30px;
        max-width: 400px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); min-height: 85vh;
        }
        
        #reader { width: 100%; border-radius: 20px; overflow: hidden; background: #000; margin-bottom: 15px; min-height: 250px; }
        
        .info-box { background: rgba(255,255,255,0.5); padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        .user-id { font-size: 14px; color: #888; font-weight: bold; } 
        .user-name { font-size: 42px; font-weight: 900; color: var(--primary-pink); margin: 0; line-height: 1.1; }
        .user-balance { font-size: 36px; font-weight: bold; color: #333; margin: 5px 0; }
        
        .input-group { margin-bottom: 20px; }
        .amount-input { 
            width: 80%; border: 3px solid var(--dark-gray); border-radius: 15px; 
            font-size: 42px; font-weight: bold; padding: 10px; text-align: center; outline: none; color: #000;
        }
        
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-quick { background: white; border: none; border-radius: 15px; padding: 15px 0; font-size: 18px; font-weight: bold; box-shadow: 0 4px 0 #ddd; }
        .btn-quick:active { transform: translateY(2px); box-shadow: none; }
        .q-plus { color: #4caf50; } .q-minus { color: #f44336; }
        
        /* 5大分區與品項按鈕排版優化 */
        .category-container { text-align: left; margin-bottom: 20px; background: rgba(255,255,255,0.3); padding: 12px; border-radius: 18px; }
        .category-title { font-size: 16px; font-weight: bold; color: #fff; background: var(--primary-pink); padding: 4px 12px; border-radius: 10px; display: inline-block; margin-bottom: 10px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn-item { background: var(--btn-light); border: none; border-radius: 12px; padding: 10px 2px; font-size: 13px; font-weight: bold; color: #444; text-align: center; box-shadow: 0 2px 0 #ccc; }
        .btn-item.active { background: var(--dark-gray); color: white; box-shadow: none; }
        
        .action-btn { display: block; width: 100%; padding: 18px 0; font-size: 20px; font-weight: bold; border: none; border-radius: 15px; cursor: pointer; margin-bottom: 10px; }
        .action-btn:disabled { background: var(--disabled-gray) !important; box-shadow: none !important; cursor: not-allowed; color: #ddd !important; }
        
        #start-btn { background: #4CAF50; color: white; }
        #ok-btn { background: var(--primary-pink); color: white; box-shadow: 0 5px 0 #ad005f; }
        #reset-btn { background: #666; color: white; }

        /* 🛒 購物車樣式 */
        .cart-box { background: rgba(255, 255, 255, 0.85); padding: 15px; border-radius: 20px; margin-bottom: 20px; text-align: left; border: 2px dashed var(--primary-pink); }
        .cart-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #e0e0e0; font-size: 15px; }
        .cart-row:last-child { border-bottom: none; }
        .btn-del-item { background: #f44336; color: white; border: none; padding: 3px 8px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: bold; }

        /* 彈窗樣式 */
        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 92%; max-width: 400px; font-size: 20px; color: #333; box-sizing: border-box; }
        .modal-header { text-align: center; font-weight: bold; color: #28a745; margin-bottom: 15px; font-size: 26px; }
        .modal-body { text-align: left; border-top: 1px dashed #ccc; border-bottom: 1px dashed #ccc; padding: 20px 0; margin-bottom: 20px; }
        .modal-line { margin-bottom: 12px; display: flex; align-items: center; }
        .modal-label { display: inline-block; width: 140px; flex-shrink: 0; font-weight: bold; white-space: nowrap; text-align-last: justify; }
        .modal-value { flex-grow: 1; padding-left: 5px; }
        .modal-btn { width: 100%; padding: 18px; background: var(--primary-pink); color: white; border: none; border-radius: 12px; font-size: 22px; font-weight: bold; }
    </style>
</head>

<body>
<div class="main-card">
    <h2>💰 優兒夏令營行動銀行 💰</h2>
    <button id="start-btn" class="action-btn" onclick="initAndStart()">📢 點擊啟動相機</button>
    <div id="reader" style="display:none;"></div>

    <div id="trade-ui" style="display:none;">
        <div class="info-box">
            <div id="display-id" class="user-id">ID: ----</div>
            <div id="display-name" class="user-name">---</div>
            <div style="font-size:14px; color:#666; margin-top:5px;">目前餘額</div>
            <div id="display-balance" class="user-balance">---</div>
        </div>
        
        <div class="input-group">
            <div style="font-size:14px; color:#555; margin-bottom:5px; font-weight:bold;">異動金額 (可手動修改)</div>
            <input type="number" id="amount-input" class="amount-input" value="0" oninput="manualInput(this.value)">
        </div>
        
        <div class="grid-4">
            <button class="btn-quick q-plus" onclick="modAmt(1)">+1</button>
            <button class="btn-quick q-plus" onclick="modAmt(5)">+5</button>
            <button class="btn-quick q-plus" onclick="modAmt(10)">+10</button>
            <button class="btn-quick q-plus" onclick="modAmt(50)">+50</button>
            <button class="btn-quick q-minus" onclick="modAmt(-1)">-1</button>
            <button class="btn-quick q-minus" onclick="modAmt(-5)">-5</button>
            <button class="btn-quick q-minus" onclick="modAmt(-10)">-10</button>
            <button class="btn-quick q-minus" onclick="modAmt(-50)">-50</button>
        </div>

        <div style="max-height: 380px; overflow-y: auto; margin-bottom: 15px; border-radius: 15px; padding-right: 5px;">
            
            <div class="category-container">
                <div class="category-title">⛺ 1. 設備租借</div>
                <div class="grid-3">
                    <button class="btn-item" onclick="selectItem(this, '桌子', -50)">桌子(-50)</button>
                    <button class="btn-item" onclick="selectItem(this, '小椅子', -20)">小椅子(-20)</button>
                    <button class="btn-item" onclick="selectItem(this, '帳篷', -100)">帳篷(-100)</button>
                    <button class="btn-item" onclick="selectItem(this, '大電風扇', -100)">大電風扇(-100)</button>
                    <button class="btn-item" onclick="selectItem(this, '吊床', -100)">吊床(-100)</button>
                    <button class="btn-item" onclick="selectItem(this, '睡袋', -150)">睡袋(-150)</button>
                    <button class="btn-item" onclick="selectItem(this, '遺失工本費', -100)">遺失費(-100)</button>
                </div>
            </div>

            <div class="category-container">
                <div class="category-title">🛡️ 2. 生存消費</div>
                <div class="grid-3">
                    <button class="btn-item" onclick="selectItem(this, '水彈', -20)">水彈(-20)</button>
                    <button class="btn-item" onclick="selectItem(this, '長槍', -20)">長槍(-20)</button>
                    <button class="btn-item" onclick="selectItem(this, '勇敢冒險(滑降)', -20)">滑降(-20)</button>
                    <button class="btn-item" onclick="selectItem(this, '勇敢冒險(垂降)', -20)">垂降(-20)</button>
                    <button class="btn-item" onclick="selectItem(this, '打火石', 0)">打火石(0)</button>
                    <button class="btn-item" onclick="selectItem(this, '打火機', -10)">打火機(-10)</button>
                    <button class="btn-item" onclick="selectItem(this, '教練生火', -150)">教練生火(-150)</button>
                </div>
            </div>

            <div class="category-container">
                <div class="category-title">🏆 3. 獎勵金項目</div>
                <div class="grid-3">
                    <button class="btn-item" onclick="selectItem(this, '全鑽獎金', 10)">全鑽(+10)</button>
                    <button class="btn-item" onclick="selectItem(this, '負責任金', 10)">負責任(+10)</button>
                    <button class="btn-item" onclick="selectItem(this, '任務獎金', 10)">任務(+10)</button>
                    <button class="btn-item" onclick="selectItem(this, '勇敢冒險助金', 20)">冒險助(+20)</button>
                    <button class="btn-item" onclick="selectItem(this, '點心販賣', 30)">點心販(+30)</button>
                    <button class="btn-item" onclick="selectItem(this, '午餐販賣', 50)">午餐販(+50)</button>
                    <button class="btn-item" onclick="selectItem(this, '設備二手拍賣', 0)">二手拍(0)</button>
                </div>
            </div>

            <div class="category-container">
                <div class="category-title">🍪 4. 點心部</div>
                <div class="grid-3">
                    <button class="btn-item" onclick="selectItem(this, '蘋果汁', -10)">蘋果汁(-10)</button>
                    <button class="btn-item" onclick="selectItem(this, '可爾必思', -10)">可爾必必(-10)</button>
                    <button class="btn-item" onclick="selectItem(this, '舒跑', -10)">舒跑(-10)</button>
                    <button class="btn-item" onclick="selectItem(this, '餅乾', -15)">餅乾(-15)</button>
                    <button class="btn-item" onclick="selectItem(this, '布丁', -15)">布丁(-15)</button>
                </div>
            </div>

            <div class="category-container">
                <div class="category-title">🍜 5. 餐廳部</div>
                <div class="grid-3">
                    <button class="btn-item" onclick="selectItem(this, '營養什錦湯麵', -500)">湯麵(-500)</button>
                    <button class="btn-item" onclick="selectItem(this, '猩美雞肉咖哩飯', -500)">咖哩飯(-500)</button>
                    <button class="btn-item" onclick="selectItem(this, '香濃玉米濃湯', -250)">玉米湯(-250)</button>
                    <button class="btn-item" onclick="selectItem(this, '珍珠冬瓜茶', -250)">冬瓜茶(-250)</button>
                    <button class="btn-item" onclick="selectItem(this, '紅茶', -10)">紅茶(-10)</button>
                </div>
            </div>

        </div>

        <button id="add-cart-btn" class="action-btn" style="background: #ff9800; color: white; box-shadow: 0 5px 0 #e65100; margin-bottom: 15px;" onclick="addItemToCart()">🛒 加入購物車</button>

        <div id="cart-section" class="cart-box" style="display: none;">
            <div style="font-size: 15px; font-weight: bold; color: var(--primary-pink); margin-bottom: 8px; text-align: center;">🛒 目前待結帳明細</div>
            <div id="cart-items-list" style="max-height: 160px; overflow-y: auto;"></div>
            <div style="border-top: 1px dashed #bbb; margin-top: 8px; padding-top: 8px; font-weight: bold; text-align: right; font-size: 15px;">
                合計變動：<span id="cart-total-val" style="color: red;">0</span> 元
            </div>
        </div>

        <button id="ok-btn" class="action-btn" onclick="doTrade()">確認交易送出</button>
        <button id="reset-btn" class="action-btn" onclick="resetToScan()">取消 / 重新掃描</button>
    </div>
</div>

<div id="custom-modal">
    <div class="modal-content">
        <div class="modal-header">✅ 交易成功！</div>
        <div id="modal-body-content" class="modal-body"></div>
        <button class="modal-btn" onclick="closeModal()">確定</button>
    </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbzI8YIKfK2h5MVeUOWE1oJq4mHu4KguUOVS_gt0wZdHvSz1AaDaOaE8jCD0rmz9q9SV/exec";
const TOKEN = "abc123";
let scanner = null, globalId = "", currentAmt = 0, currentNote = "", oldBalance = 0;
let cart = [];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playBeep(freq = 1200, duration = 0.1) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.8, audioCtx.currentTime); 
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
}

const successSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
successSound.crossOrigin = "anonymous"; successSound.volume = 0.3;

function initAndStart() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    successSound.load(); 
    document.getElementById("start-btn").style.display = "none";
    document.getElementById("reader").style.display = "block";
    startScan();
}

async function startScan() {
    if (!scanner) scanner = new Html5Qrcode("reader");
    try {
        await scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (text) => {
            playBeep(); globalId = text.trim(); scanner.stop().then(() => fetchData());
        });
    } catch (e) { console.error(e); }
}

async function fetchData() {
    document.getElementById("reader").style.display = "none";
    document.getElementById("trade-ui").style.display = "block";
    document.getElementById("display-name").innerText = "連線中...";
    try {
        const res = await fetch(`${scriptURL}?id=${globalId}&amount=0&token=${TOKEN}`);
        const data = await res.json();
        if (data.status === "success") {
            oldBalance = data.balance;
            document.getElementById("display-id").innerText = "ID: " + globalId;
            document.getElementById("display-name").innerText = data.name;
            document.getElementById("display-balance").innerText = data.balance;
        } else { alert("查無資料"); resetToScan(); }
    } catch (e) { alert("連線失敗"); resetToScan(); }
}

function modAmt(v) { 
    currentAmt += v;
    document.getElementById("amount-input").value = currentAmt; 
}

function manualInput(val) {
    currentAmt = parseInt(val) || 0;
}

// 🚀 智慧點選品項：自動帶入名稱與預設負數/正數單價
function selectItem(btn, note, defaultPrice) { 
    document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('active')); 
    btn.classList.add('active'); 
    currentNote = note;
    currentAmt = defaultPrice;
    document.getElementById("amount-input").value = currentAmt;
}

function addItemToCart() {
    if (!currentNote) return alert("請先選取下方一個交易項目！");
    cart.push({ note: currentNote, amount: currentAmt });
    
    // 清空選取狀態
    currentAmt = 0;
    currentNote = "";
    document.getElementById("amount-input").value = "0";
    document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('active'));
    renderCart();
}

function delCartItem(index) {
    cart.splice(index, 1);
    renderCart();
}

function renderCart() {
    const sect = document.getElementById("cart-section");
    const list = document.getElementById("cart-items-list");
    const totalEl = document.getElementById("cart-total-val");
    const btnOk = document.getElementById("ok-btn");
    
    if (cart.length === 0) {
        sect.style.display = "none";
        btnOk.innerText = "確認交易送出";
        return;
    }
    
    sect.style.display = "block";
    let html = ""; let total = 0;
    cart.forEach((item, idx) => {
        total += item.amount;
        html += `<div class="cart-row">
            <span>${idx + 1}. <b>${item.note}</b> (${item.amount > 0 ? '+' : ''}${item.amount}元)</span>
            <button class="btn-del-item" onclick="delCartItem(${idx})">❌</button>
        </div>`;
    });
    list.innerHTML = html;
    totalEl.innerText = (total > 0 ? "+" : "") + total;
    btnOk.innerText = `🛒 確認購物車送出 (${cart.length}筆)`;
}

function resetToScan() {
    globalId = ""; currentAmt = 0; currentNote = ""; cart = [];
    renderCart();
    document.getElementById("amount-input").value = "0";
    document.getElementById("trade-ui").style.display = "none";
    document.getElementById("reader").style.display = "block";
    
    const btnOk = document.getElementById("ok-btn");
    const btnReset = document.getElementById("reset-btn");
    const btnAddCart = document.getElementById("add-cart-btn");
    
    btnOk.disabled = false; btnOk.innerText = "確認交易送出";
    btnReset.disabled = false;
    if(btnAddCart) btnAddCart.disabled = false;
    
    document.querySelectorAll('.btn-item').forEach(b => b.classList.remove('active'));
    startScan();
}

function closeModal() { document.getElementById("custom-modal").style.display = "none"; resetToScan(); }
function createModalLine(label, value) { return `<div class="modal-line"><span class="modal-label">${label}</span><span class="modal-value">： ${value}</span></div>`; }

async function doTrade() {
    let tradesToSend = [];
    if (cart.length > 0) {
        tradesToSend = [...cart];
    } else {
        if (!currentNote) return alert("請選取交易項目或加入購物車");
        tradesToSend.push({ note: currentNote, amount: currentAmt });
    }
    
    const btnOk = document.getElementById("ok-btn");
    const btnReset = document.getElementById("reset-btn");
    const btnAddCart = document.getElementById("add-cart-btn");
    
    btnOk.disabled = true; btnOk.innerText = "⏳ 交易進行中...";
    btnReset.disabled = true; if(btnAddCart) btnAddCart.disabled = true;
    
    try {
        let finalNewBalance = oldBalance;
        let finalName = ""; let detailsHtml = "";
        
        for (let i = 0; i < tradesToSend.length; i++) {
            const t = tradesToSend[i];
            if (tradesToSend.length > 1) {
                btnOk.innerText = `⏳ 進行中 (${i+1}/${tradesToSend.length})`;
            }
            const res = await fetch(`${scriptURL}?id=${globalId}&amount=${t.amount}&token=${TOKEN}&note=${encodeURIComponent(t.note)}&tid=T${Date.now()}_${i}`);
            const data = await res.json();
            
            if (data.status === "success") {
                finalNewBalance = data.newBalance;
                finalName = data.name;
                detailsHtml += `<div style="font-size:15px; margin-bottom:4px; padding-left:10px;">• ${t.note}：<b>${t.amount > 0 ? '+' : ''}${t.amount}元</b></div>`;
            } else { 
                alert(`❌ 第 ${i+1} 筆失敗：` + data.message);
                btnOk.disabled = false; btnReset.disabled = false;
                if(btnAddCart) btnAddCart.disabled = false;
                renderCart(); return;
            }
        }
        
        successSound.play().catch(()=>{});
        let infoHTML = createModalLine("【學員 ID】", globalId) + 
                       createModalLine("【學員姓名】", finalName) + 
                       `<div class="modal-line" style="margin-bottom:5px;"><span class="modal-label">【交易明細】</span>：</div>
                        <div style="background:#f5f5f5; border-radius:10px; padding:8px; margin-bottom:12px; text-align:left;">${detailsHtml}</div>` + 
                       createModalLine("【原金額】", oldBalance) + 
                       createModalLine("【新餘額】", finalNewBalance);
                       
        document.getElementById("modal-body-content").innerHTML = infoHTML;
        document.getElementById("custom-modal").style.display = "flex";
        cart = [];
    } catch (e) { 
        alert("網路錯誤或連線逾時，請檢查後台試算表！");
        btnOk.disabled = false; btnReset.disabled = false;
        if(btnAddCart) btnAddCart.disabled = false;
        renderCart();
    }
}
</script>
</body>
</html>
