<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>優兒夏令營行動銀行 Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --gray: #6c757d; --light-gray: #e9ecef; }
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 10px; background: #f0f2f5; margin: 0; overflow-x: hidden; }
        h2 { margin: 15px 0; color: #1a1a1a; font-size: 22px; }

        /* 掃描容器 */
        #reader-container { width: 90%; max-width: 400px; margin: 10px auto; position: relative; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; background: #000; border: 4px solid white !important; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        #reader__dashboard_section_csr, #reader__camera_selection, #reader img { display: none !important; }

        /* 交易介面 */
        #result-section { display: none; padding: 15px; background: white; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: 10px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .info-box { background: #f8f9fa; padding: 12px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #eee; }
        .name { font-size: 26px; font-weight: bold; color: var(--primary); margin-bottom: 2px; }
        .balance { font-size: 34px; font-weight: 900; color: #333; }
        .id-badge { font-size: 11px; color: #aaa; margin-bottom: 5px; }

        /* 黑框區：手動輸入框優化 */
        .input-wrapper { margin: 10px 0; }
        input[type="number"] { 
            padding: 12px; 
            font-size: 36px; 
            width: 85%; 
            border-radius: 15px; 
            border: 2px solid var(--primary); 
            text-align: center; 
            font-weight: bold; 
            background: #fff;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
            outline: none;
        }
        
        .section-title { text-align: left; font-size: 13px; color: #777; margin: 10px 0 5px 8px; font-weight: bold; }

        /* 紅框區：2列4欄佈局 */
        .btn-grid-8 { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 8px; 
            margin-bottom: 15px; 
        }
        
        /* 交易分類佈局 */
        .btn-grid-3 { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 8px; 
            margin-bottom: 15px; 
        }

        .btn-small { 
            padding: 12px 2px; 
            font-size: 16px; 
            background: #fff; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            font-weight: bold; 
            transition: 0.1s;
        }
        .btn-small:active { background: #eee; transform: scale(0.92); }
        
        .btn-category { background: var(--light-gray); color: #444; border: 2px solid transparent; font-size: 14px; }
        .btn-category.active { background: var(--primary) !important; color: white !important; border-color: #0056b3; }
        
        button.main { padding: 18px; font-size: 22px; font-weight: bold; border-radius: 18px; border: none; width: 100%; margin-top: 5px; cursor: pointer; }
        .btn-confirm { background: var(--success); color: white; }
        .btn-cancel { background: var(--gray); color: white; margin-top: 10px; font-size: 16px; padding: 12px; }

        #start-btn { padding: 20px 50px; font-size: 22px; font-weight: bold; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; margin: 60px auto; display: block; }
    </style>
</head>
<body>

    <h2 id="main-title">💰 優兒夏令營行動銀行</h2>
    
    <div id="reader-container">
        <div id="reader"></div>
        <button id="start-btn" onclick="requestPermission()">啟動鏡頭</button>
    </div>
    
    <div id="result-section">
        <div class="info-box">
            <div id="display-name" class="name">載入中...</div>
            <div class="id-badge">學員 ID: <span id="display-id">---</span></div>
            <div style="font-size: 13px; color: #888;">目前餘額</div>
            <div id="display-balance" class="balance">---</div>
        </div>
        
        <div class="input-wrapper">
            <input type="number" id="amount" value="0" placeholder="0" pattern="[0-9-]*">
        </div>
        
        <div class="section-title">快速金額增減</div>
        <div class="btn-grid-8">
            <button class="btn-small" onclick="addVal(1)" style="color:var(--success)">+1</button>
            <button class="btn-small" onclick="addVal(5)" style="color:var(--success)">+5</button>
            <button class="btn-small" onclick="addVal(10)" style="color:var(--success)">+10</button>
            <button class="btn-small" onclick="addVal(50)" style="color:var(--success)">+50</button>
            <button class="btn-small" onclick="addVal(-1)" style="color:var(--danger)">-1</button>
            <button class="btn-small" onclick="addVal(-5)" style="color:var(--danger)">-5</button>
            <button class="btn-small" onclick="addVal(-10)" style="color:var(--danger)">-10</button>
            <button class="btn-small" onclick="addVal(-50)" style="color:var(--danger)">-50</button>
        </div>

        <div class="section-title">交易項目</div>
        <div class="btn-grid-3">
            <button class="btn-small btn-category" onclick="setNote(this, '餅乾')">🍪 餅乾</button>
            <button class="btn-small btn-category" onclick="setNote(this, '飲料')">🧃 飲料</button>
            <button class="btn-small btn-category" onclick="setNote(this, '其他')">❓ 其他</button>
        </div>
        <input type="hidden" id="note" value="一般交易">
        
        <button id="send-btn" class="main btn-confirm" onclick="sendData()">確認交易</button>
        <button class="main btn-cancel" onclick="resumeScanner()">取消並重掃</button>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbx61w5SchKA2-CUpBs3QBCOS79u5CoPy7yZMTzbiLJo-MySiAn_O-96DGuC68bJs1Pz/exec"; 
        let html5QrCode;
        let globalId = ""; 
        let isPaused = false;

        function requestPermission() {
            const startBtn = document.getElementById('start-btn');
            if(startBtn) startBtn.style.display = 'none';
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 20, qrbox: { width: 220, height: 220 }, aspectRatio: 1.0 };
            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .catch(() => { if(startBtn) startBtn.style.display = 'block'; });
        }

        function onScanSuccess(decodedText) {
            if (isPaused) return;
            isPaused = true;
            if (navigator.vibrate) navigator.vibrate(80);
            globalId = decodedText.trim();

            document.getElementById('reader-container').style.display = 'none';
            document.getElementById('main-title').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            
            document.getElementById('display-id').innerText = globalId;
            document.getElementById('display-name').innerText = "讀取中...";
            document.getElementById('amount').value = 0;

            fetch(`${scriptURL}?id=${encodeURIComponent(globalId)}&amount=0`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('display-name').innerText = data.name || "查無此人";
                document.getElementById('display-balance').innerText = data.balance ?? "---";
            });
        }

        function resumeScanner() {
            isPaused = false;
            document.getElementById('result-section').style.display = 'none';
            document.getElementById('reader-container').style.display = 'block';
            document.getElementById('main-title').style.display = 'block';
        }

        // 金額增減邏輯
        function addVal(v) {
            const input = document.getElementById('amount');
            // 確保原本沒數字時也能計算
            let current = parseInt(input.value);
            if (isNaN(current)) current = 0;
            input.value = current + v;
        }

        function setNote(btn, n) {
            document.querySelectorAll('.btn-category').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('note').value = n;
        }

        function sendData() {
            const amountVal = document.getElementById('amount').value;
            const noteVal = document.getElementById('note').value;
            
            if(amountVal == 0 || amountVal == "") return alert("請輸入或點選金額");

            const btn = document.getElementById('send-btn');
            btn.innerText = "寫入資料中..."; btn.disabled = true;

            fetch(`${scriptURL}?id=${encodeURIComponent(globalId)}&amount=${amountVal}&note=${encodeURIComponent(noteVal)}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    alert(`✅ 成功！\n餘額變動：${amountVal}\n剩餘金額：${data.newBalance}`);
                    btn.innerText = "確認交易"; btn.disabled = false;
                    resumeScanner();
                } else {
                    alert("失敗：" + data.message);
                    btn.innerText = "確認交易"; btn.disabled = false;
                }
            })
            .catch(() => {
                alert("網路異常，請再試一次");
                btn.innerText = "確認交易"; btn.disabled = false;
            });
        }
    </script>
</body>
</html>
