<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>優兒行動銀行 v2.6</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --brand-pink: #e6007e; --brand-cyan: #00bfff; }
        body { font-family: -apple-system, sans-serif; text-align: center; margin: 0; background: var(--brand-pink); color: white; min-height: 100vh; }
        .main-container { padding: 20px 10px; }
        #reader { width: 90%; max-width: 350px; margin: 0 auto; border-radius: 20px; border: 5px solid white !important; display: none; overflow: hidden; }
        #result-section { display: none; padding: 20px; background: white; border-radius: 30px; color: #333; margin: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .info-box { background: #f8f9fa; padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #eee; }
        .name { font-size: 28px; font-weight: bold; color: var(--brand-pink); }
        .balance { font-size: 45px; font-weight: 900; color: #000; margin: 5px 0; }
        input[type="number"] { padding: 10px; font-size: 38px; width: 80%; border-radius: 15px; border: 3px solid #333; text-align: center; margin-bottom: 10px; }
        
        .section-title { text-align: left; font-size: 14px; color: #666; margin: 10px 0 5px 5px; font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-small { padding: 15px 0; font-size: 18px; border-radius: 10px; border: 1px solid #ddd; background: white; font-weight: bold; }
        
        /* 項目按鈕網格 - 調整為三格一排 */
        .item-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .btn-item { padding: 12px 0; background: #eee; border-radius: 10px; border: 1px solid #ccc; font-size: 13px; font-weight: bold; cursor: pointer; color: #444; }
        .btn-item.active { background: var(--brand-pink) !important; color: white !important; border-color: var(--brand-pink); }
        
        .btn-main { padding: 18px; width: 100%; border-radius: 20px; border: none; font-size: 22px; font-weight: bold; cursor: pointer; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--brand-pink); border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="main-container">
        <h2>💰 優兒行動銀行</h2>
        <div id="reader-container">
            <div id="reader"></div>
            <div id="logo-box" style="margin-top:40px;">
                <img src="./logo.png" style="width:70%;">
                <button onclick="startScan()" style="display:block; margin:30px auto; padding:20px 50px; font-size:24px; border-radius:50px; background:var(--brand-cyan); color:white; border:none; font-weight:bold;">啟動掃描器</button>
            </div>
        </div>

        <div id="result-section">
            <div class="info-box">
                <div id="display-name" class="name">讀取中...</div>
                <div id="display-balance" class="balance">---</div>
                <div id="status-msg" style="font-size:11px; color: #999;"></div>
            </div>
            
            <input type="number" id="amount" value="0" inputmode="numeric">
            
            <div class="section-title">金額快速調整</div>
            <div class="btn-grid">
                <button class="btn-small" style="color:green" onclick="adj(1)">+1</button>
                <button class="btn-small" style="color:green" onclick="adj(5)">+5</button>
                <button class="btn-small" style="color:green" onclick="adj(10)">+10</button>
                <button class="btn-small" style="color:green" onclick="adj(50)">+50</button>
                <button class="btn-small" style="color:red" onclick="adj(-1)">-1</button>
                <button class="btn-small" style="color:red" onclick="adj(-5)">-5</button>
                <button class="btn-small" style="color:red" onclick="adj(-10)">-10</button>
                <button class="btn-small" style="color:red" onclick="adj(-50)">-50</button>
            </div>

            <div class="section-title">交易項目 (點擊選擇)</div>
            <div class="item-grid">
                <button class="btn-item active" onclick="setN(this, '餅乾')">🍪 餅乾</button>
                <button class="btn-item" onclick="setN(this, '飲料')">🧃 飲料</button>
                <button class="btn-item" onclick="setN(this, '其他')">❓ 其他</button>
                <button class="btn-item" onclick="setN(this, '預留1')">預留1</button>
                <button class="btn-item" onclick="setN(this, '預留2')">預留2</button>
                <button class="btn-item" onclick="setN(this, '預留3')">預留3</button>
                <button class="btn-item" onclick="setN(this, '預留4')">預留4</button>
                <button class="btn-item" onclick="setN(this, '預留5')">預留5</button>
                <button class="btn-item" onclick="setN(this, '預留6')">預留6</button>
                <button class="btn-item" onclick="setN(this, '預留7')">預留7</button>
                <button class="btn-item" onclick="setN(this, '預留8')">預留8</button>
                <button class="btn-item" onclick="setN(this, '預留9')">預留9</button>
            </div>
            <input type="hidden" id="note" value="餅乾">
            
            <button id="ok-btn" class="btn-main" style="background:#28a745; color:white;" onclick="doTrade()">確認扣款</button>
            <button class="btn-main" style="background:#888; color:white; margin-top:15px; font-size:16px;" onclick="location.reload()">重新掃描</button>
        </div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbx61w5SchKA2-CUpBs3QBCOS79u5CoPy7yZMTzbiLJo-MySiAn_O-96DGuC68bJs1Pz/exec";
        let scanner, globalId = "", isBusy = false, tid = "";

        function startScan() {
            document.getElementById('logo-box').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScan).catch(() => alert("啟動相機失敗"));
        }

        function onScan(text) {
            if (isBusy) return;
            isBusy = true;
            globalId = text.trim();
            tid = "T" + Date.now();
            document.getElementById('reader-container').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            if(scanner) scanner.stop();
            fetchData();
        }

        async function fetchData(retry = 0) {
            const nameEl = document.getElementById('display-name');
            const msgEl = document.getElementById('status-msg');
            msgEl.innerHTML = `<div class="loader"></div> 資料同步中...`;

            try {
                const res = await fetch(`${scriptURL}?id=${encodeURIComponent(globalId)}&amount=0&t=${Date.now()}`);
                const data = await res.json();
                if (data.status === "success") {
                    nameEl.innerText = data.name;
                    document.getElementById('display-balance').innerText = data.balance;
                    msgEl.innerHTML = "✅ 連線正常";
                } else { throw new Error(); }
            } catch (e) {
                if (retry < 2) {
                    setTimeout(() => fetchData(retry + 1), 1500);
                } else {
                    nameEl.innerHTML = `<span onclick="location.reload()" style="color:red; text-decoration:underline; cursor:pointer;">讀取失敗 (重試)</span>`;
                    msgEl.innerText = "⚠️ 網路異常，請刷新頁面";
                }
            }
        }

        async function doTrade() {
            const amt = document.getElementById('amount').value;
            if (amt == 0) return alert("請輸入金額");
            const btn = document.getElementById('ok-btn');
            btn.innerText = "⏳ 處理中..."; btn.disabled = true;

            try {
                const noteValue = document.getElementById('note').value;
                const res = await fetch(`${scriptURL}?id=${encodeURIComponent(globalId)}&amount=${amt}&tid=${tid}&note=${encodeURIComponent(noteValue)}`);
                const data = await res.json();
                if (data.status === "success") {
                    alert(`✅ 交易完成！\n學員：${data.name}\n新餘額：${data.newBalance}`);
                    location.reload();
                } else { alert("❌ 失敗：" + data.message); resetBtn(); }
            } catch (e) {
                alert("🔴 網路不穩！請檢查後台 Log 是否已寫入。");
                resetBtn();
            }
        }

        function adj(v) { document.getElementById('amount').value = (parseInt(document.getElementById('amount').value) || 0) + v; }
        function setN(btn, n) {
            document.querySelectorAll('.btn-item').forEach(e => e.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('note').value = n;
        }
        function resetBtn() {
            const btn = document.getElementById('ok-btn');
            btn.innerText = "確認扣款"; btn.disabled = false;
        }
    </script>
</body>
</html>
