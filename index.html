<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>夏令營行動銀行 Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --gray: #6c757d; --light-gray: #e9ecef; }
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 15px; background: #f0f2f5; color: #333; margin: 0; }
        h2 { margin: 15px 0; color: #1a1a1a; font-size: 24px; }
        
        /* 相機容器 */
        #reader-container { width: 100%; max-width: 450px; margin: 0 auto; }
        #reader { width: 100%; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.15); background: #000; min-height: 280px; border: none !important; }
        
        /* 隱藏掃描套件多餘的 UI */
        #reader__dashboard_section_csr, #reader__camera_selection, #reader img, #reader span { display: none !important; }

        /* 結果頁面容器 */
        #result-section { margin-top: 15px; padding: 20px; background: white; border-radius: 20px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .info-box { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; }
        .name { font-size: 26px; font-weight: bold; color: var(--primary); }
        .balance { font-size: 32px; font-weight: 900; }
        .id-badge { font-size: 12px; color: #999; margin: 5px 0; }

        /* 金額輸入框 */
        input[type="number"] { padding: 12px; font-size: 28px; width: 85%; margin: 10px 0; border-radius: 12px; border: 2px solid #ddd; text-align: center; font-weight: bold; background: #fff; color: #000; outline: none; }
        
        /* 按鈕格線 */
        .section-title { text-align: left; font-size: 14px; color: #666; margin: 15px 0 5px 5px; font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-small { padding: 12px; font-size: 18px; background: #fff; border: 1px solid #ddd; border-radius: 8px; font-weight: bold; }
        
        /* 分類按鈕 - 顏色狀態區分 */
        .btn-category { background: var(--light-gray); color: #495057; border: 2px solid transparent; font-size: 16px; transition: all 0.15s; }
        .btn-category.active { background: var(--primary) !important; color: white !important; border-color: #0056b3; font-weight: bold; transform: scale(0.98); }
        
        /* 主按鈕 */
        button.main { padding: 18px; font-size: 20px; font-weight: bold; border-radius: 15px; border: none; width: 100%; margin-top: 10px; }
        .btn-confirm { background: var(--success); color: white; }
        .btn-cancel { background: var(--gray); color: white; }

        #start-btn { padding: 20px 40px; font-size: 22px; font-weight: bold; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; margin: 50px auto; display: block; box-shadow: 0 4px 15px rgba(0,123,255,0.4); }
    </style>
</head>
<body>

    <h2>💰 優兒夏令營行動銀行</h2>
    
    <div id="reader-container">
        <div id="reader"></div>
        <button id="start-btn" onclick="requestPermission()">開啟相機掃描</button>
    </div>
    
    <div id="result-section">
        <div class="info-box">
            <div id="display-name" class="name">讀取中...</div>
            <div class="id-badge">ID: <span id="display-id">---</span></div>
            <span style="font-size: 14px; color: #666;">目前餘額：</span>
            <div id="display-balance" class="balance">---</div>
        </div>
        
        <input type="number" id="amount" value="0" readonly>
        
        <div class="section-title">快速金額加總</div>
        <div class="btn-grid">
            <button class="btn-small" onclick="addVal(5)" style="color:var(--success)">+5</button>
            <button class="btn-small" onclick="addVal(10)" style="color:var(--success)">+10</button>
            <button class="btn-small" onclick="addVal(50)" style="color:var(--success)">+50</button>
            <button class="btn-small" onclick="addVal(-5)" style="color:var(--danger)">-5</button>
            <button class="btn-small" onclick="addVal(-10)" style="color:var(--danger)">-10</button>
            <button class="btn-small" onclick="addVal(-50)" style="color:var(--danger)">-50</button>
        </div>

        <div class="section-title">交易分類 (藍色為選中)</div>
        <div class="btn-grid">
            <button class="btn-small btn-category" onclick="setNote(this, '餅乾')">🍪 餅乾</button>
            <button class="btn-small btn-category" onclick="setNote(this, '飲料')">🧃 飲料</button>
            <button class="btn-small btn-category" onclick="setNote(this, '其他')">❓ 其他</button>
            <button class="btn-small btn-category" onclick="setNote(this, '預留1')">預留1</button>
            <button class="btn-small btn-category" onclick="setNote(this, '預留2')">預留2</button>
            <button class="btn-small btn-category" onclick="setNote(this, '預留3')">預留3</button>
        </div>
        <input type="hidden" id="note" value="一般交易">
        
        <button id="send-btn" class="main btn-confirm" onclick="sendData()">確認交易</button>
        <button class="main btn-cancel" onclick="location.reload()">重新掃描</button>
    </div>

    <script>
        // 設定 Apps Script 網址
        const scriptURL = "https://script.google.com/macros/s/AKfycbx61w5SchKA2-CUpBs3QBCOS79u5CoPy7yZMTzbiLJo-MySiAn_O-96DGuC68bJs1Pz/exec"; 
        
        let html5QrCode;
        let globalId = ""; 

        // 1. 請求相機權限並開始掃描
        function requestPermission() {
            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = true;
            startBtn.innerText = "相機準備中...";

            html5QrCode = new Html5Qrcode("reader");
            
            const config = { 
                fps: 30, // 提高掃描頻率
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0,
                videoConstraints: { facingMode: "environment" }
            };

            html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
            .then(() => {
                startBtn.style.display = 'none';
            })
            .catch(err => {
                alert("相機啟動失敗，請確認是否為 HTTPS 環境並已允許權限");
                location.reload();
            });
        }

        // 2. 掃描成功後的邏輯
        function onScanSuccess(decodedText) {
            globalId = decodedText.trim();
            if (navigator.vibrate) navigator.vibrate(100);
            
            // [暴力跳轉] 立即顯示結果頁面
            document.getElementById('reader-container').style.setProperty("display", "none", "important");
            document.getElementById('result-section').style.display = 'block';
            document.getElementById('display-id').innerText = globalId;

            // 背景停止相機
            setTimeout(() => { 
                if(html5QrCode) html5QrCode.stop().catch(() => {}); 
            }, 10);

            // 初始化文字
            document.getElementById('display-name').innerText = "連線後台中...";
            document.getElementById('display-balance').innerText = "---";

            // 抓取後台資料
            fetch(`${scriptURL}?id=${encodeURIComponent(globalId)}&amount=0`, {
                method: 'GET',
                mode: 'cors'
            })
            .then(res => res.json())
            .then(data => {
                if(data.name || data.status === "info" || data.status === "success") {
                    document.getElementById('display-name').innerText = data.name || "未命名學員";
                    document.getElementById('display-balance').innerText = data.balance !== undefined ? data.balance : "0";
                } else {
                    document.getElementById('display-name').innerText = "查無此 ID";
                    document.getElementById('display-balance').innerText = "檢查試算表";
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('display-name').innerText = "網路連線異常";
                document.getElementById('display-balance').innerText = "請檢查後台權限";
            });
        }

        // 3. 金額增減邏輯
        function addVal(v) {
            const input = document.getElementById('amount');
            input.value = parseInt(input.value || 0) + v;
        }

        // 4. 分類按鈕選取邏輯
        function setNote(btn, n) {
            // 清除所有 active 樣式
            document.querySelectorAll('.btn-category').forEach(el => el.classList.remove('active'));
            // 點選的按鈕變藍色
            btn.classList.add('active');
            document.getElementById('note').value = n;
        }

        // 5. 送出交易
        function sendData() {
            const amountVal = document.getElementById('amount').value;
            const noteVal = document.getElementById('note').value;
            
            if(amountVal == 0) return alert("金額不可為 0");
            if(!globalId) return alert("遺失學員 ID，請刷新頁面");

            const btn = document.getElementById('send-btn');
            const originalText = btn.innerText;
            btn.innerText = "傳送中..."; 
            btn.disabled = true;

            fetch(`${scriptURL}?id=${encodeURIComponent(globalId)}&amount=${amountVal}&note=${encodeURIComponent(noteVal)}`, {
                method: 'GET',
                mode: 'cors'
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    alert(`✅ 交易成功！\n學員：${data.name}\n變動：${amountVal}\n餘額：${data.newBalance}`);
                    location.reload();
                } else {
                    alert("失敗：" + (data.message || "未知錯誤"));
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            })
            .catch(err => {
                alert("伺服器連線失敗，請檢查網路或 Apps Script 部署");
                btn.disabled = false;
                btn.innerText = originalText;
            });
        }
    </script>
</body>
</html>
