<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>夏令營行動銀行 Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --gray: #6c757d; }
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 15px; background: #f0f2f5; color: #333; margin: 0; }
        h2 { margin: 15px 0; color: #1a1a1a; font-size: 24px; }
        
        #reader { width: 100%; max-width: 450px; margin: 0 auto; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.15); background: #000; border: none !important; position: relative; }
        
        /* 隱藏紅框字樣、黃框切換按鈕、以及所有多餘元素 */
        #reader__dashboard_section_csr, #reader__camera_selection, #reader img, #reader span { display: none !important; }

        #result-section { margin-top: 15px; padding: 20px; background: white; border-radius: 20px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .info-box { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #eee; }
        .name { font-size: 26px; font-weight: bold; color: var(--primary); }
        .balance { font-size: 32px; font-weight: 900; }

        input[type="number"] { padding: 15px; font-size: 28px; width: 85%; margin: 10px 0; border-radius: 12px; border: 2px solid #ddd; text-align: center; font-weight: bold; background: #fff; color: #000; }
        
        .section-title { text-align: left; font-size: 14px; color: #666; margin: 15px 0 5px 5px; font-weight: bold; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .btn-small { padding: 12px; font-size: 16px; background: #fff; border: 1px solid #ddd; border-radius: 8px; font-weight: bold; }
        .btn-category { background: #e9ecef; color: #495057; border: none; }
        
        button.main { padding: 18px; font-size: 20px; font-weight: bold; border-radius: 15px; border: none; width: 100%; margin-top: 10px; }
        .btn-confirm { background: var(--success); color: white; }
        .btn-cancel { background: var(--gray); color: white; }

        #start-btn { padding: 20px 40px; font-size: 22px; font-weight: bold; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; margin: 50px auto; display: block; box-shadow: 0 4px 15px rgba(0,123,255,0.4); }
    </style>
</head>
<body>

    <h2>💰 夏令營行動銀行</h2>
    
    <div id="reader">
        <button id="start-btn" onclick="requestPermission()">開啟相機掃描</button>
    </div>
    
    <div id="result-section">
        <div class="info-box">
            <span class="name" id="display-name">讀取中...</span><br>
            <span style="font-size: 14px; color: #666;">目前餘額：</span>
            <span id="display-balance" class="balance">---</span>
        </div>
        
        <input type="number" id="amount" value="0" readonly>
        
        <div class="section-title">快速金額加總</div>
        <div class="btn-grid">
            <button class="btn-small" onclick="addVal(100)" style="color:var(--success)">+100</button>
            <button class="btn-small" onclick="addVal(50)" style="color:var(--success)">+50</button>
            <button class="btn-small" onclick="addVal(10)" style="color:var(--success)">+10</button>
            <button class="btn-small" onclick="addVal(-100)" style="color:var(--danger)">-100</button>
            <button class="btn-small" onclick="addVal(-50)" style="color:var(--danger)">-50</button>
            <button class="btn-small" onclick="addVal(-10)" style="color:var(--danger)">-10</button>
        </div>

        <div class="section-title">交易分類 (Logs)</div>
        <div class="btn-grid">
            <button class="btn-small btn-category" onclick="setNote('餅乾')">🍪 餅乾</button>
            <button class="btn-small btn-category" onclick="setNote('飲料')">🧃 飲料</button>
            <button class="btn-small btn-category" onclick="setNote('其他')">❓ 其他</button>
            <button class="btn-small btn-category" onclick="setNote('預留1')">預留</button>
            <button class="btn-small btn-category" onclick="setNote('預留2')">預留</button>
            <button class="btn-small btn-category" onclick="setNote('預留3')">預留</button>
            <button class="btn-small btn-category" onclick="setNote('預留4')">預留</button>
            <button class="btn-small btn-category" onclick="setNote('預留5')">預留</button>
            <button class="btn-small btn-category" onclick="setNote('預留6')">預留</button>
            <button class="btn-small btn-category" onclick="setNote('預留7')">預留</button>
            <button class="btn-small btn-category" onclick="setNote('預留8')">預留</button>
            <button class="btn-small btn-category" onclick="setNote('預留9')">預留</button>
        </div>
        <input type="hidden" id="note" value="一般交易">
        
        <button id="send-btn" class="main btn-confirm" onclick="sendData()">確認交易</button>
        <button class="main btn-cancel" onclick="location.reload()">重新掃描</button>
    </div>

    <script>
        // 已經內嵌你提供的 Apps Script 網址
        const scriptURL = "https://script.google.com/macros/s/AKfycbybK8nRtGlEoJSmOd6_3ZNn84k_I0_puHjfNQRNj0VpsQ8GsVaykVsuiQKqM5u7eKA/exec"; 
        
        let currentId = "";
        let html5QrCode;

        function requestPermission() {
            document.getElementById('start-btn').style.display = 'none';
            html5QrCode = new Html5Qrcode("reader");
            
            const config = { 
                fps: 30, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0
            };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess
            ).catch(err => {
                alert("相機開啟失敗，請確認權限");
                document.getElementById('start-btn').style.display = 'block';
            });
        }

        function onScanSuccess(decodedText) {
            currentId = decodedText.trim();
            if (navigator.vibrate) navigator.vibrate(100);
            
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('result-section').style.display = 'block';
                
                fetch(`${scriptURL}?id=${encodeURIComponent(currentId)}&amount=0`)
                .then(res => res.json())
                .then(data => {
                    if(data.status === "info") {
                        document.getElementById('display-name').innerText = data.name;
                        document.getElementById('display-balance').innerText = data.balance;
                    }
                });
            });
        }

        function addVal(v) {
            let input = document.getElementById('amount');
            input.value = parseInt(input.value || 0) + v;
        }

        function setNote(n) {
            document.getElementById('note').value = n;
            alert("分類已選擇：" + n);
        }

        function sendData() {
            const amountVal = document.getElementById('amount').value;
            const noteVal = document.getElementById('note').value;
            if(amountVal == 0) return alert("金額不能為 0");

            const btn = document.getElementById('send-btn');
            btn.innerText = "傳送中..."; btn.disabled = true;

            fetch(`${scriptURL}?id=${encodeURIComponent(currentId)}&amount=${amountVal}&note=${encodeURIComponent(noteVal)}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    alert(`✅ 成功！\n${data.name} (${noteVal})\n新餘額：${data.newBalance}`);
                    location.reload();
                }
            })
            .catch(() => location.reload());
        }
    </script>
</body>
</html>
